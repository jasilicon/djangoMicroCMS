<section id="contact" class="py-20 px-4 bg-white">
    <div class="max-w-6xl mx-auto">
        <h2 class="text-3xl md:text-4xl font-bold text-center text-charcoal-500 mb-3">Contact Us</h2>
        <div class="flex items-center justify-center gap-2 mb-12">
            <span class="w-8 h-0.5 bg-wine-600 rounded-full"></span>
            <span class="w-2 h-2 bg-wine-600 rounded-full"></span>
            <span class="w-8 h-0.5 bg-wine-600 rounded-full"></span>
        </div>

        <div class="grid md:grid-cols-2 gap-12">
            <div class="space-y-6">
                {% if business.address %}
                    <div class="flex items-start gap-4">
                        <div class="w-10 h-10 bg-wine-100 rounded-lg flex items-center justify-center flex-shrink-0">
                            <svg class="w-5 h-5 text-wine-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        </div>
                        <div>
                            <h4 class="font-semibold text-charcoal-500">Address</h4>
                            <p class="text-charcoal-400">{{ business.address|linebreaksbr }}</p>
                        </div>
                    </div>
                {% endif %}

                {% if business.phone %}
                    <div class="flex items-start gap-4">
                        <div class="w-10 h-10 bg-sage-100 rounded-lg flex items-center justify-center flex-shrink-0">
                            <svg class="w-5 h-5 text-sage-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
                        </div>
                        <div>
                            <h4 class="font-semibold text-charcoal-500">Phone</h4>
                            <a href="tel:{{ business.phone }}" class="text-charcoal-400 hover:text-wine-600 transition">{{ business.phone }}</a>
                        </div>
                    </div>
                {% endif %}

                {% if business.email %}
                    <div class="flex items-start gap-4">
                        <div class="w-10 h-10 bg-wine-100 rounded-lg flex items-center justify-center flex-shrink-0">
                            <svg class="w-5 h-5 text-wine-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                        </div>
                        <div>
                            <h4 class="font-semibold text-charcoal-500">Email</h4>
                            <a href="mailto:{{ business.email }}" class="text-charcoal-400 hover:text-wine-600 transition">{{ business.email }}</a>
                        </div>
                    </div>
                {% endif %}
            </div>

            {% if business.google_maps_embed_url %}
                <div class="rounded-xl overflow-hidden shadow-sm border border-charcoal-100 h-80">
                    <iframe src="{{ business.google_maps_embed_url }}"
                            width="100%" height="100%" style="border:0;"
                            allowfullscreen="" loading="lazy"
                            referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>
            {% endif %}
        </div>
    </div>
</section>
