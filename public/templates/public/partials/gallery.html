<section id="gallery" class="py-20 px-4 bg-white">
    <div class="max-w-6xl mx-auto">
        <h2 class="text-3xl md:text-4xl font-bold text-center text-charcoal-500 mb-3">Gallery</h2>
        <div class="flex items-center justify-center gap-2 mb-12">
            <span class="w-8 h-0.5 bg-wine-600 rounded-full"></span>
            <span class="w-2 h-2 bg-wine-600 rounded-full"></span>
            <span class="w-8 h-0.5 bg-wine-600 rounded-full"></span>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            {% for image in gallery %}
                <a href="{{ image.image.url }}" target="_blank"
                   class="group relative block aspect-square overflow-hidden rounded-xl bg-charcoal-100">
                    <img src="{{ image.image.url }}"
                         alt="{{ image.caption }}"
                         class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                    {% if image.caption %}
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition flex items-end p-4">
                            <p class="text-white text-sm">{{ image.caption }}</p>
                        </div>
                    {% endif %}
                </a>
            {% endfor %}
        </div>
    </div>
</section>
