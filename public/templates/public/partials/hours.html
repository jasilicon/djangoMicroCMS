<section id="hours" class="py-20 px-4 bg-cream">
    <div class="max-w-lg mx-auto">
        <h2 class="text-3xl md:text-4xl font-bold text-center text-charcoal-500 mb-3">Business Hours</h2>
        <div class="flex items-center justify-center gap-2 mb-12">
            <span class="w-8 h-0.5 bg-wine-600 rounded-full"></span>
            <span class="w-2 h-2 bg-wine-600 rounded-full"></span>
            <span class="w-8 h-0.5 bg-wine-600 rounded-full"></span>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-charcoal-100 divide-y divide-charcoal-100 overflow-hidden">
            {% for slot in hours %}
                <div class="flex items-center justify-between px-6 py-4 {% if forloop.counter0 == today %}bg-wine-50{% endif %}">
                    <span class="font-medium text-charcoal-500">{{ slot.get_day_display }}</span>
                    {% if slot.is_closed %}
                        <span class="text-charcoal-300">Closed</span>
                    {% else %}
                        <span class="text-charcoal-400">
                            {{ slot.open_time|time:"g:i A" }} – {{ slot.close_time|time:"g:i A" }}
                        </span>
                    {% endif %}
                </div>
            {% empty %}
                <p class="text-center text-charcoal-400 py-8">Hours not yet set.</p>
            {% endfor %}
        </div>
    </div>
</section>
