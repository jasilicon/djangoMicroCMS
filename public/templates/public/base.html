<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ business.name }}{% endblock %}</title>
    <meta name="description" content="{{ business.tagline }}">
    {% if business.favicon %}<link rel="icon" type="image/x-icon" href="{{ business.favicon.url }}">{% endif %}
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        wine: {
                            50: '#fdf2f4',
                            100: '#fce7ea',
                            200: '#f9d0d8',
                            300: '#f4a9b7',
                            400: '#ed7a8f',
                            500: '#e24d69',
                            600: '#c92a4a',
                            700: '#a91d39',
                            800: '#651C32',
                            900: '#57182b',
                            950: '#310b17',
                        },
                        cream: '#FFF8F0',
                        charcoal: {
                            50: '#f5f5f5',
                            100: '#e0e0e0',
                            200: '#b3b3b3',
                            300: '#808080',
                            400: '#4d4d4d',
                            500: '#2d2d2d',
                            600: '#262626',
                            700: '#1f1f1f',
                            800: '#181818',
                            900: '#111111',
                        },
                        sage: {
                            50: '#f3f7f1',
                            100: '#e7efe5',
                            200: '#cfdfcb',
                            300: '#b7cfb1',
                            400: '#9fbf97',
                            500: '#7d9b76',
                            600: '#647c5e',
                            700: '#4b5d46',
                            800: '#323e2e',
                            900: '#191f16',
                        },
                    }
                }
            }
        }
    </script>
    <style>
        html { scroll-behavior: smooth; }
        @media (max-width: 768px) {
            .utility-bar { display: none; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-cream text-charcoal-500 font-sans antialiased">
    {% block content %}{% endblock %}
</body>
</html>
