{% extends "public/base.html" %}
{% block title %}Setup Required{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-cream px-4">
    <div class="text-center max-w-lg">
        <div class="w-20 h-20 bg-terracotta-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10 text-terracotta-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
            </svg>
        </div>
        <h1 class="text-3xl font-bold text-charcoal-500 mb-4">Website Not Published Yet</h1>
        <p class="text-charcoal-400 mb-8">Log in to the admin panel to set up your business profile and publish your site.</p>
        <a href="/owner/" class="inline-block bg-terracotta-500 hover:bg-terracotta-600 text-white font-semibold px-8 py-3 rounded-lg transition shadow-lg">
            Go to Admin
        </a>
    </div>
</div>
{% endblock %}
